# OmniRay Active SLAM — Training & Model Configuration

# Gym Environment Settings
env:
  num_rays: 128
  map_resolution: 50
  max_steps: 200
  use_slam: true
  real_world_noise: true

# Deep RL Neural Network Architecture
network:
  features_dim: 256
  pi_arch: [128, 64]
  vf_arch: [128, 64]
  cnn:
    coverage_channels: [16, 32]
    coverage_kernel: 3
    coverage_stride: 2
    coverage_padding: 1
    slam_channels: [16, 32]
    slam_kernel: 3
    slam_stride: 2
    slam_padding: 1
  mlp:
    lidar_dim: 64
    pose_dim: 32
    slam_pose_dim: 32

# Stable-Baselines3 PPO Hyperparameters
ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  total_timesteps: 50000
